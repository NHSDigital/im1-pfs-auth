name: "CI/CD"

on:
  push:
    branches: [main]
  workflow_dispatch: # Temporary manual trigger for testing

concurrency:
  group: ${{ github.workflow }}

permissions: {}

jobs:
  core-code-checks:
    name: "Run Core Code Checks"
    uses: ./.github/workflows/reusable-core-code-checks.yml
    permissions:
      contents: read
      id-token: write

  additional-code-checks:
    name: "Run Additional Code Checks"
    uses: ./.github/workflows/reusable-additional-code-checks.yml
    permissions:
      contents: read
      id-token: write

  deploy-to-internal-qa:
    name: "Deploy to Internal QA Environment"
    uses: ./.github/workflows/cicd-stage-1-deploy-to-internal-qa.yml
    needs:
      - core-code-checks
      - additional-code-checks
    secrets: inherit

  deploy-to-int-and-sandbox:
    name: "Deploy to Int and Sandbox Environments"
    uses: ./.github/workflows/cicd-stage-2-deploy-to-int-and-sandbox.yml
    needs: deploy-to-internal-qa
    secrets: inherit

  deploy-to-prod-require-appoval:
    name: "Require approval for production workflow"
    needs: deploy-to-int-and-sandbox
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - run: echo "Approved — now calling CICD stage 3 Deploy to Produciton workflow"

  deploy-to-prod:
    name: "Deploy to Production Environments"
    uses: ./.github/workflows/cicd-stage-3-deploy-to-prod.yml
    needs: deploy-to-prod-require-appoval
    secrets: inherit
