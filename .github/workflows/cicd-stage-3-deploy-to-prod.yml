name: "CI/CD Stage 3 Deploy to Prod"

on:
  workflow_call:

permissions: {}

jobs:
  deploy-int-app:
    name: "Deploy Pull Request App Environment"
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: "production"
      type_of_deployment: "app"
      emis_base_url: https://api.pfs.emis-x.uk
      tpp_base_url: https://systmonline.tpp-uk.com 
    secrets:
      PROXYGEN_CLIENT_ID: ${{ secrets.PROXYGEN_CLIENT_ID }}
      PROXYGEN_KEY_ID: ${{ secrets.PROXYGEN_KEY_ID }}
      PROXYGEN_PRIVATE_KEY: ${{ secrets.PROXYGEN_PRIVATE_KEY }}

  deploy-prod-spec:
    name: "Deploy Specification to Production"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python Dependencies
        uses: ./.github/actions/setup-python-dependencies
      - name: Setup proxygen
        uses: ./.github/actions/setup-proxygen
        with:
          PROXYGEN_CLIENT_ID: ${{ secrets.PROXYGEN_CLIENT_ID }}
          PROXYGEN_KEY_ID: ${{ secrets.PROXYGEN_KEY_ID }}
          PROXYGEN_PRIVATE_KEY: ${{ secrets.PROXYGEN_PRIVATE_KEY }}
      - name: Deploy Specification to Production
        run: make deploy-spec-prod-ci
        env:
          # Variables are necessary for spec generation, but aren't used in compiled spec
          ENVIRONMENT: "prod"
          PROXYGEN_URL_PATH: "im1-pfs-auth"
          CONTAINER_TAG: "latest"
